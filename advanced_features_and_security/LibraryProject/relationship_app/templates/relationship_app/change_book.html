<!DOCTYPE html>
<html lang = 'en'>
<head>
    <meta charset = 'UTF-8'>
    <title> Change Book </title>
</head>
<body>
    <h1> Change Book </h1>

    <form method = "post">
        {% csrf_token %}

        <label> Title: </label>
        <input type = "text" name = "title" value = "{{ book.title }}" required><br><br>

        <label> Author: </label>
        <input type = "text" name = "author" value = "{{ book.author.name }}" required><br><br>

        <button type = "submit"> Change Book </button>
    </form>

    <br>
    <a href = "{%  url 'list-books' %}"> Back to Book List </a>

</body>
</html>
