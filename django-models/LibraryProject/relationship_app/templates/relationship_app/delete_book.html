<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Book</title>
</head>
<body>

    <h1>Delete Book </h1>

    <p>Are you sure you want to delete:</p>

    <h3>{{ book.title }} by {{ book.author }}</h3>

    <form method="post">
        {% csrf_token %}

        <button type="submit">Delete</button>
    </form>

    <br>
    <a href="{% url 'list-books' %}">Cancel</a>

</body>
</html>
